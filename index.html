<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UNIQDO</title>
  <link href="login.css" rel="stylesheet">
  <link href="home.css" rel="stylesheet">
  <script src="login.js"></script>
  <script src="home.js"></script>
</head>
<body>
  <nav class="navbar">
    <img src="uniqdo.png" alt="Uniqdo image">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="#featured">Shop</a>
      <a href="about.html">About</a>
      <a href="support.html">Support</a>
      <a onclick="logOut()">Log Out</a>
    </div>
  </nav>
  <hr>

  <section class="hero">
    <h1>WELCOME TO UNIQDO</h1>
    <p>Discover the latest in minimalist fashion.</p>
    <a href="#featured"><button class="btn hero-btn">SHOP NOW</button></a>
  </section>

  <section class="featured" id="featured">
    <h2><b>FEATURED PRODUCTS</b></h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="essential_tee.png" alt="Essential Tee" class="product-img">
        <h3>Essential Tee</h3>
        <p class="price">RM 89.90</p>
        <button class="btn-small" onclick="addToBag(this)">ADD TO BAG</button>
      </div>
      <div class="product-card">
        <img src="tailored_trousers.png" alt="Tailored Trousers" class="product-img">
        <h3>Tailored Trousers</h3>
        <p class="price">RM 149.90</p>
        <button class="btn-small" onclick="addToBag(this)">ADD TO BAG</button>
      </div>
      <div class="product-card">
        <img src="wool_overcoat.png" alt="Wool Overcoat" class="product-img">
        <h3>Wool Overcoat</h3>
        <p class="price">RM 299.90</p>
        <button class="btn-small" onclick="addToBag(this)">ADD TO BAG</button>
      </div>
    </div>
  </section>

  <footer>
    COPYRIGHT &copy; UNIQDO CO., LTD. ALL RIGHTS RESERVED.
    <div class="footer-links"><a href="support.html">Support</a></div>
  </footer>
